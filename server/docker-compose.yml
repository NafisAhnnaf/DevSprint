services:
# Database Service:
  dev-sprint-postgres-user:
    image: postgres:16-alpine
    container_name: dev-sprint-postgres-user
    environment:
      POSTGRES_USER: dhongorsho
      POSTGRES_PASSWORD: dhongorsho123
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"       # different host port to avoid conflicts
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - sprint-network 

# Database Service:
  dev-sprint-postgres-inventory:
    image: postgres:16-alpine
    container_name: dev-sprint-postgres-inventory
    environment:
      POSTGRES_USER: dhongorsho
      POSTGRES_PASSWORD: dhongorsho123
      POSTGRES_DB: inventory_db
    ports:
      - "5434:5432"       # different host port to avoid conflicts
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - sprint-network 

# Database Service:
  dev-sprint-postgres-kitchen:
    image: postgres:16-alpine
    container_name: dev-sprint-postgres-kitchen
    environment:
      POSTGRES_USER: dhongorsho
      POSTGRES_PASSWORD: dhongorsho123
      POSTGRES_DB: kitchen_db
    ports:
      - "5435:5432"       # different host port to avoid conflicts
    volumes:
      - kitchen-db-data:/var/lib/postgresql/data
    networks:
      - sprint-network 


# Caching Service:
  dev-sprint-redis:
    image: redis:7-alpine
    container_name: dev-sprint-redis
    ports:
      - "6380:6379"       # different host port
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - sprint-network 

# RabbitMQ Service:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq_service
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: "IUT_Dhongorsho"
      RABBITMQ_DEFAULT_PASS: "Dhongorsho123"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always
    networks:
      - sprint-network 

# Gateway Service (Scaled & Exposed via Nginx):
  gateway:
    build: ./Gateway
    depends_on:
      - dev-sprint-postgres-user
      - dev-sprint-redis
    environment:
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4001
      JWT_SECRET: "dhongorsho"
      IDENTITY_SERVICE_URL: "http://identity:4002"
      INVENTORY_SERVICE_URL: "http://inventory:4003"
      KITCHEN_SERVICE_URL: "http://kitchen:4004"
      NOTIFICATION_SERVICE_URL: "http://notification:4005"
    deploy:
      replicas: 2
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network 


# Identity Service (Scaled):
  identity:
    build: ./Identity
    depends_on:
      - dev-sprint-postgres-user
      - dev-sprint-redis
    environment:
      DATABASE_URL: "postgresql://dhongorsho:dhongorsho123@dev-sprint-postgres-user:5432/user_db?schema=public&connection_limit=3"
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4002
      JWT_SECRET: "dhongorsho"
    deploy:
      replicas: 2
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network 


# Inventory Service (Scaled):
  inventory:
    build: ./Inventory
    depends_on:
      - dev-sprint-postgres-inventory
      - dev-sprint-redis
      - rabbitmq
    environment:
      DATABASE_URL: "postgresql://dhongorsho:dhongorsho123@dev-sprint-postgres-inventory:5432/inventory_db?schema=public&connection_limit=3"
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4003
      RABBITMQ_URL: "amqp://IUT_Dhongorsho:Dhongorsho123@rabbitmq:5672"  
      RABBITMQ_EXCHANGE: "order_exchange" 
    deploy:
      replicas: 2
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network 


# Kitchen Service (Scaled):
  kitchen:
    build: ./Kitchen
    depends_on:
      - dev-sprint-postgres-kitchen
      - dev-sprint-redis
      - rabbitmq
    environment:
      DATABASE_URL: "postgresql://dhongorsho:dhongorsho123@dev-sprint-postgres-kitchen:5432/kitchen_db?schema=public&connection_limit=3"
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4004
      RABBITMQ_URL: "amqp://IUT_Dhongorsho:Dhongorsho123@rabbitmq:5672"  
      RABBITMQ_EXCHANGE: "order_exchange" 
    deploy:
      replicas: 2
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network 


# Notification Service (Scaled):
  notification:
    build: ./Notification
    depends_on:
      - dev-sprint-redis
      - rabbitmq
    environment:
      REDIS_URL: "redis://dev-sprint-redis:6379"
      PORT: 4005
      RABBITMQ_URL: "amqp://IUT_Dhongorsho:Dhongorsho123@rabbitmq:5672" 
      RABBITMQ_EXCHANGE: "order_exchange"  
    deploy:
      replicas: 2
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network 

  # Nginx Gateway & Static Server
  nginx:
    image: nginx:alpine
    container_name: dev-sprint-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - dev-sprint-frontend
    restart: always
    networks:
      - sprint-network

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: dev-sprint-prometheus
    volumes:
      - ./Prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: always
    networks:
      - sprint-network

  # Grafana Dashboard with provisioned datasources
  grafana:
    image: grafana/grafana:latest
    container_name: dev-sprint-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dhongorsho123
      GF_SERVER_ENABLE_GZIP: "true"
      GF_DEFAULT_ORG_ID: 1  
      GF_SECURITY_ALLOW_EMBEDDING: "true"  # This allows embedding
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./Grafana/provisioning:/etc/grafana/provisioning
    restart: always
    networks:
      - sprint-network

  # Grafana Loki Log Collector
  loki:
    image: grafana/loki:2.9.2
    container_name: dev-sprint-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/data
    restart: always
    networks:
      - sprint-network

  # Promtail Container Log scraper
  promtail:
    image: grafana/promtail:2.9.2
    container_name: dev-sprint-promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./Promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    restart: always
    networks:
      - sprint-network

  # Chaos Testing: Pumba Docker-native Chaos Injector
  chaos-pumba:
    image: gaiaadm/pumba:latest
    container_name: dev-sprint-pumba
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - chaos
    # Randomly kill kitchen service containers every 45s to test DB job recovery and MQ reliability
    command: --interval 45s kill --signal SIGKILL re:kitchen
    restart: always
    networks:
      - sprint-network

  dev-sprint-k6:
    image: grafana/k6:latest
    container_name: dev-sprint-k6
    volumes:
      - ./Tests/All/load-test.js:/scripts/load-test.js  # Mount your test script
    networks:
      - sprint-network

  dev-sprint-frontend:
    build: ../frontend
    container_name: dev-sprint-frontend
    environment:
      VITE_API_URL: "http://localhost"
    ports:
      - "5173:5173"
    volumes:
      - pnpm-store:/pnpm-store
    restart: always
    networks:
      - sprint-network


volumes:
  user-db-data:
  inventory-db-data:
  kitchen-db-data:
  redis-data:
  rabbitmq_data:
  prometheus-data:
  grafana-data:
  loki-data:
  pnpm-store:
  

networks:
  sprint-network:
    driver: bridge