global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:4001']  # Docker service name:internal port
        labels:
          service: 'gateway'

  - job_name: 'identity'
    static_configs:
      - targets: ['identity:4002']  # Direct to service, not via gateway
        labels:
          service: 'identity'

  - job_name: 'inventory'
    static_configs:
      - targets: ['inventory:4003']
        labels:
          service: 'inventory'

  - job_name: 'kitchen'
    static_configs:
      - targets: ['kitchen:4004']
        labels:
          service: 'kitchen'

  - job_name: 'notification'
    static_configs:
      - targets: ['notification:4005']
        labels:
          service: 'notification'