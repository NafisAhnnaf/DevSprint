events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream gateway_servers {
        server gateway:4001;
    }

    upstream frontend_server {
        server dev-sprint-frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend Vite Dev Server (supports HMR / web sockets)
        location / {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy API Gateway Requests
        location /api/ {
            proxy_pass http://gateway_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy Server-Sent Events (SSE) for Notification Service
        location /api/notification/orders {
            proxy_pass http://gateway_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header X-Accel-Buffering no;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400s;
        }
    }
}
